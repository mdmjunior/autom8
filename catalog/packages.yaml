packages:
  - name: Visual Studio Code
    slug: vscode
    category: IDEs
    description: Editor de código da Microsoft.
    icon: vscode
    homepage_url: https://code.visualstudio.com
    install_method: script
    risk_level: low
    requires_reboot: false
    requires_third_party_repo: true
    is_active: true
    is_featured: true
    tags:
      - editor
      - ide
      - code
    variants:
      ubuntu:
        is_supported: true
        repository_setup_command: |
          sudo apt update
          sudo apt install -y wget gpg
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
          sudo install -D -o root -g root -m 644 packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          rm -f packages.microsoft.gpg
          sudo apt update
        install_command: |
          sudo apt install -y code
      fedora:
        is_supported: true
        repository_setup_command: |
          sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc
          printf "[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\n" | sudo tee /etc/yum.repos.d/vscode.repo > /dev/null
          sudo dnf check-update || true
        install_command: |
          sudo dnf install -y code

