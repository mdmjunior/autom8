services:
  autom8_site:
    image: ${AUTOM8_SITE_IMAGE:-autom8-site:latest}
    networks:
      - oslabs-public
    deploy:
      replicas: ${AUTOM8_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 5s
        monitor: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        monitor: 30s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 60s
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=oslabs-public"
        - "traefik.http.routers.autom8.rule=Host(`autom8.oslabs.com.br`)"
        - "traefik.http.routers.autom8.entrypoints=websecure"
        - "traefik.http.routers.autom8.tls=true"
        - "traefik.http.routers.autom8.tls.certresolver=letsencrypt"
        - "traefik.http.routers.autom8.service=autom8"
        - "traefik.http.services.autom8.loadbalancer.server.port=80"

networks:
  oslabs-public:
    external: true
