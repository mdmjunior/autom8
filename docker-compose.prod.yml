services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: autom8-prod-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - autom8_prod_storage:/var/www/html/storage
      - autom8_prod_bootstrap_cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  web:
    image: nginx:stable
    container_name: autom8-prod-web
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./:/var/www/html
      - autom8_prod_storage:/var/www/html/storage
      - autom8_prod_bootstrap_cache:/var/www/html/bootstrap/cache
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: autom8-prod-db
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - autom8_prod_db:/var/lib/mysql
    restart: unless-stopped

volumes:
  autom8_prod_db:
  autom8_prod_storage:
  autom8_prod_bootstrap_cache:
