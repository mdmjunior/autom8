server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location = /install.sh {
        default_type text/x-shellscript;
        add_header Cache-Control "no-cache";
        try_files /install.sh =404;
    }

    location /downloads/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
