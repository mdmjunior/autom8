name: ci-and-deploy

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.4" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          rm -rf database/database.sqlite
          touch database/database.sqlite

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          {
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"
          } >> .env

      - name: Add Flux credentials when available
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}
          FLUX_LICENSE_KEY: ${{ secrets.FLUX_LICENSE_KEY }}
        if: ${{ env.FLUX_USERNAME != '' && env.FLUX_LICENSE_KEY != '' }}
        run: composer config http-basic.composer.fluxui.dev "$FLUX_USERNAME"
          "$FLUX_LICENSE_KEY"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Build Assets
        run: npm run build

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: ./vendor/bin/pest

  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    needs: test
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Deploy to development VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/autom8-dev
            ./deploy-dev.sh

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/autom8-prod
            ./deploy-prod.sh
