name: Quality - Common

on:
  workflow_call:

permissions:
  contents: read

jobs:
  repository-integrity:
    name: Repository integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Validate repository
        run: ./scripts/common/check-repository.sh
