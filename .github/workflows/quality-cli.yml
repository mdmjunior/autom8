name: Quality - CLI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cli:
    name: CLI quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install native dependencies
        run: |
          sudo apt-get update --quiet
          sudo apt-get install --yes --quiet \
            jq \
            libadwaita-1-dev \
            libgtk-4-dev \
            pkg-config

      - name: Prepare Rust toolchain
        run: rustup component add clippy rustfmt

      - name: Validate CLI and GNOME foundation
        run: ./scripts/cli/check.sh

      - name: Check generated catalog
        run: git diff --exit-code -- suite/catalog/apps.json

      - name: Run Ubuntu foundation smoke test
        run: ./scripts/smoke-ubuntu-desktop.sh

      - name: Confirm legacy packaging is blocked
        run: |
          if ./scripts/package.sh >package-output.txt 2>&1; then
            cat package-output.txt
            echo "O empacotador legado deveria estar bloqueado." >&2
            exit 1
          fi

          grep -Fq "Etapa 8" package-output.txt
